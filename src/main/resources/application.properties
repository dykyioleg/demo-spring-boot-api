spring.application.name=demo
spring.threads.virtual.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/demo?schema=demo
spring.datasource.username=postgres
spring.datasource.password=XlQIppEarQ6
spring.datasource.driverClassName=org.postgresql.Driver

# HikariCP Connection Pool Configuration
# Optimized for virtual threads - allows more concurrent DB operations
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=DemoHikariPool

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

logging.level.com.example=debug
# Include traceId in log pattern with thread name
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [traceId: %X{traceId}] %-5level %logger{36} - %msg%n

# Micrometer Tracing Configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# JWT Security Configuration
jwt.issuer=https://demo.example.com
jwt.audience=demo-api
jwt.public-

# External Service Configuration
external.service.base-url=https://jsonplaceholder.typicode.com
external.service.timeout.connection=5000
external.service.timeout.read=5000

