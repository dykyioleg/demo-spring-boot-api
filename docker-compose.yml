version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: demo-postgres
    ports:
      - "5432:5432"
    environment:
      TZ: CET
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: XlQIppEarQ6
    healthcheck:
      # https://marc.info/?l=postgresql-general&m=138488483804329&w=2
      test: [ "CMD-SHELL", "pg_isready --dbname=postgresql://localhost:5432/demo" ]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - demo-network

  app:
    image: demo-api
    container_name: demo-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demo?schema=demo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: XlQIppEarQ6
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge
